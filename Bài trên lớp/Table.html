<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Thực hành bảng HTML</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <table border="2" width="50%" height="50%" bordercolor="black" align="left" valign="center" bgcolor="white" cellpadding="10px" cellspacing="0px">
            <tr>
                <th colspan="4">Thông tin khách hàng</th>
            </tr>
            <tr height="50px" bgcolor="yellow" align="left">
                <th><strong>Số thứ tự</strong></th>
                <th>Họ và tên</th>
                <th>Năm sinh</th>
                <th>Quê quán</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Nguyễn Văn A</td>
                <td>1997</td>
                <td rowspan="2" valign="center" align="left">Hà Nội</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Trần Thị B</td>
                <td>2004</td>
            </tr>
        </table>
    </body>
</html>
